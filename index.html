<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>osu!LalxaVir</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-glow bg-glow-1"></div>
    <div class="bg-glow bg-glow-2"></div>
    
    <nav class="navbar glass">
        <div class="nav-container">
            <a href="index.html" class="logo">
                <div class="logo-icon">
                    <i class="fas fa-circle-nodes"></i>
                </div>
                <span class="logo-text">osu!<span class="logo-highlight">LalxaVir</span></span>
            </a>
            <div class="nav-links">
                <a href="index.html" class="active">首页</a>
                <a href="osu_std.html">osu!std</a>
                <a href="osu_mania.html">osu!mania</a>
            </div>
            <button id="theme-toggle" class="theme-toggle glass" aria-label="切换暗色模式">
                <i class="fas fa-moon"></i>
            </button>
        </div>
    </nav>

    <main>
        <section class="hero fade-in">
            <div class="hero-content">
                <div class="avatar-wrapper">
                    <div class="avatar-ring"></div>
                    <div class="avatar glass">
                        <i class="fas fa-crown"></i>
                    </div>
                </div>
                <h1 class="hero-title">LalxaVir</h1>
                <div class="hero-stats-mini">
                    <a href="osu_std.html" class="mini-stat">
                        <i class="fas fa-dot-circle"></i>
                        <span>osu!std</span>
                    </a>
                    <a href="osu_mania.html" class="mini-stat">
                        <i class="fas fa-music"></i>
                        <span>osu!mania</span>
                    </a>
                </div>
            </div>
        </section>

        <section class="mode-cards slide-up">
            <a href="osu_std.html" class="mode-card glass">
                <div class="card-accent"></div>
                <div class="card-icon-wrapper">
                    <i class="fas fa-dot-circle"></i>
                </div>
                <div class="card-content">
                    <h2>osu!std</h2>
                    <p>标准模式 · 点击与瞄准</p>
                    <div class="card-stats">
                        <span><i class="fas fa-bolt"></i> 查看数据</span>
                    </div>
                </div>
                <span class="card-arrow"><i class="fas fa-arrow-right"></i></span>
            </a>
            <a href="osu_mania.html" class="mode-card glass">
                <div class="card-accent card-accent-purple"></div>
                <div class="card-icon-wrapper">
                    <i class="fas fa-music"></i>
                </div>
                <div class="card-content">
                    <h2>osu!mania</h2>
                    <p>下落式 · 节奏与键盘</p>
                    <div class="card-stats">
                        <span><i class="fas fa-bolt"></i> 查看数据</span>
                    </div>
                </div>
                <span class="card-arrow"><i class="fas fa-arrow-right"></i></span>
            </a>
        </section>
    </main>

    <footer class="glass">
        <div class="footer-content">
            <p>© 2026 osu!LalxaVir · 基于 GitHub Pages 构建</p>
            <div class="footer-social">
                <a href="#" class="social-link"><i class="fab fa-github"></i></a>
                <a href="#" class="social-link"><i class="fab fa-discord"></i></a>
                <a href="#" class="social-link"><i class="fab fa-twitter"></i></a>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>

</html>
